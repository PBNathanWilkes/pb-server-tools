# server-sanity.conf — pblinuxutility
#
# Per-host configuration for server-sanity-check.
# Sourced by server-sanity-check at runtime from /etc/server-tools/server-sanity.conf.
# Installed by server-sanity/install.sh when run on this host.
#
# MSMTP_GROUP_MEMBERS:      accounts that send email and must be in the msmtp group.
#                           Without msmtp group membership the binary exits silently
#                           with a permission error and no log entry is written.
# REQUIRED_APT_PACKAGES:    apt packages that must be installed on this host.
# REQUIRED_SNAP_PACKAGES:   snap packages that must be installed on this host.
# REQUIRED_SERVICES:        systemd units that must be active on this host.
#                           Format: "unit_name|display_label"

MSMTP_GROUP_MEMBERS=(nathan emaildns balena-monitor golan sp-export)

# pblinuxutility hosts PDF and image conversion tooling.
REQUIRED_APT_PACKAGES=(pandoc wkhtmltopdf)
REQUIRED_SNAP_PACKAGES=(glow)

# No host-specific services beyond what other sections already cover.
REQUIRED_SERVICES=()
