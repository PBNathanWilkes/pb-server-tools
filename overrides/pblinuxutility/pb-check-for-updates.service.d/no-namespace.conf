# no-namespace.conf — pblinuxutility host override
#
# Drops all directives that require CLONE_NEWNS (mount namespace support).
# These fail with exit 226 (EXIT_NAMESPACE) on this host.
#
# Directives are reset to the empty string, which is the correct systemd
# pattern for disabling a setting inherited from the base unit.
#
# This file is installed to:
#   /etc/systemd/system/pb-check-for-updates.service.d/no-namespace.conf
#
# Retained from base unit (no namespace required):
#   LockPersonality=true
#   RestrictRealtime=true
#   RestrictSUIDSGID=true
#
# See: overrides/pblinuxutility/README.md
# See: DEV-GUIDE.md §6 KFC-R02

[Service]
ProtectSystem=
ProtectHome=
ProtectKernelModules=
ProtectKernelTunables=
ReadOnlyPaths=
ReadWritePaths=
