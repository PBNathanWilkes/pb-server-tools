# no-namespace.conf — pblinuxutility host override
#
# Disables all directives that require CLONE_NEWNS (mount namespace support).
#
# This file is installed to:
#   /etc/systemd/system/pb-security-hardening-check.service.d/no-namespace.conf
#
# Retained from base unit (no namespace required):
#   NoNewPrivileges=true
#   ProtectControlGroups=true
#   LockPersonality=true
#   RestrictNamespaces=true
#   RestrictRealtime=true
#   RestrictSUIDSGID=true
#
# See: overrides/pblinuxutility/README.md
# See: DEV-GUIDE.md §6 KFC-R02

[Service]
ProtectSystem=no
ProtectHome=no
PrivateTmp=false
ProtectKernelModules=false
ProtectKernelTunables=false
ReadWritePaths=
