# server-sanity.conf — pbwebsrv03
#
# Per-host configuration for server-sanity-check.
# Sourced by server-sanity-check at runtime from /etc/server-tools/server-sanity.conf.
# Installed by server-sanity/install.sh when run on this host.
#
# MSMTP_GROUP_MEMBERS: accounts that send email and must be in the msmtp group.
# Without msmtp group membership the binary exits silently with a permission
# error and no log entry is written.

MSMTP_GROUP_MEMBERS=(nathan pbgithub)
